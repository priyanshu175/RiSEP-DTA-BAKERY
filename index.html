<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RiSEP & DTA BAKERY</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:15px;
}

.header{
background:#d35400;
color:white;
padding:15px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.cart-box{
background:white;
color:black;
padding:8px 12px;
border-radius:20px;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card h3{
margin:10px 0;
}

.card button{
background:#25D366;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

.cart{
background:white;
margin-top:20px;
padding:15px;
border-radius:10px;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin:10px 0;
}

.qty-btn{
padding:3px 10px;
margin:0 3px;
}

.remove{
background:red;
color:white;
border:none;
padding:5px 8px;
border-radius:5px;
cursor:pointer;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

.order-btn{
width:100%;
margin-top:10px;
padding:12px;
background:#25D366;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<h2>🧁 RiSEP & DTA BAKERY</h2>
<div class="cart-box">🛒 <span id="cartCount">0</span></div>
</div>

<div class="products" id="products"></div>

<div class="cart">
<h2>Your Order</h2>
<div id="cartItems">Your cart is empty.</div>

<h3 style="margin-top:10px;">
Total ₹<span id="total">0</span>
</h3>

<input type="text" id="customerName" placeholder="Enter Your Name">

<button class="order-btn" onclick="sendWhatsApp()">
📱 Place Order on WhatsApp
</button>
</div>

<script>

const products = [
{name:"🎂 Cake",price:300},
{name:"🍰 Pastry",price:40},
{name:"🍞 Bread",price:35},
{name:"🍪 Cookies",price:60},
{name:"🍩 Donut",price:25},
{name:"🧁 Muffin",price:45},
{name:"🧁 Cupcake",price:35},
{name:"🍕 Pizza Bread",price:80},
{name:"🍫 Brownie",price:70},
{name:"🥪 Sandwich",price:90}
];

let cart=[];

const productsDiv=document.getElementById("products");

products.forEach((item,index)=>{
productsDiv.innerHTML+=`
<div class="card">
<h3>${item.name}</h3>
<p>₹${item.price}</p>
<br>
<button onclick="addToCart(${index})">
Add To Cart
</button>
</div>
`;
});

function addToCart(index){

let found=cart.find(x=>x.name===products[index].name);

if(found){
found.qty++;
}else{
cart.push({
name:products[index].name,
price:products[index].price,
qty:1
});
}

updateCart();
}

function updateCart(){

let html="";
let total=0;
let count=0;

if(cart.length===0){
document.getElementById("cartItems").innerHTML=
"Your cart is empty.";
document.getElementById("total").innerText=0;
document.getElementById("cartCount").innerText=0;
return;
}

cart.forEach((item,i)=>{

count+=item.qty;
total+=item.price*item.qty;

html+=`
<div class="cart-item">
<div>
${item.name}<br>
₹${item.price} × ${item.qty}
</div>

<div>
<button class="qty-btn" onclick="changeQty(${i},-1)">-</button>
<button class="qty-btn" onclick="changeQty(${i},1)">+</button>
<button class="remove" onclick="removeItem(${i})">X</button>
</div>
</div>
`;

});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("cartCount").innerText=count;
}

function changeQty(index,value){

cart[index].qty+=value;

if(cart[index].qty<=0){
cart.splice(index,1);
}

updateCart();
}

function removeItem(index){
cart.splice(index,1);
updateCart();
}

function sendWhatsApp(){

let name=document.getElementById("customerName").value.trim();

if(name===""){
alert("Please enter your name");
return;
}

if(cart.length===0){
alert("Cart is empty");
return;
}

let total=document.getElementById("total").innerText;

let order="";

cart.forEach(item=>{
order+=item.name+" x "+item.qty+
" = ₹"+(item.price*item.qty)+"%0A";
});

let message=
"🧁 RiSEP & DTA BAKERY%0A%0A"+
"Customer: "+name+"%0A%0A"+
order+
"%0ATotal: ₹"+total;

window.open(
"https://wa.me/919520309088?text="+message,
"_blank"
);
}

</script>

</body>
</html>
