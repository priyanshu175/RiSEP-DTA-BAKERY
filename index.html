<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RiSEP & DTA BAKERY</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
max-width:800px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
color:#d35400;
}

.item{
background:#fff;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ddd;
}

button{
background:#25D366;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

#cart{
background:white;
padding:15px;
margin-top:20px;
border-radius:8px;
border:1px solid #ddd;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}
</style>
</head>

<body>

<h1>RiSEP & DTA BAKERY</h1>

<div id="products"></div>

<div id="cart">
<h2>Your Order</h2>
<div id="cartItems"></div>

<h3>Total ₹<span id="total">0</span></h3>

<input type="text" id="customerName" placeholder="Enter Your Name">

<br><br>

<button onclick="sendWhatsApp()">Place Order on WhatsApp</button>
</div>

<script>

const products = [
["🎂 Cake",300],
["🍰 Pastry",40],
["🍞 Bread",35],
["🍪 Cookies",60],
["🍩 Donut",25],
["🧁 Muffin",45],
["🧁 Cupcake",35],
["🍕 Pizza Bread",80],
["🍫 Brownie",70],
["🥪 Sandwich",90]
];

let cart = [];

const productsDiv = document.getElementById("products");

for(let i=0;i<products.length;i++){

productsDiv.innerHTML += `
<div class="item">
<b>${products[i][0]}</b><br>
₹${products[i][1]}<br><br>
<button onclick="addToCart(${i})">Add To Cart</button>
</div>
`;

}

function addToCart(i){

cart.push(products[i]);
updateCart();

}

function updateCart(){

let html="";
let total=0;

for(let i=0;i<cart.length;i++){

html += cart[i][0] + " - ₹" + cart[i][1] + "<br>";
total += cart[i][1];

}

document.getElementById("cartItems").innerHTML = html;
document.getElementById("total").innerText = total;

}

function sendWhatsApp(){

let name = document.getElementById("customerName").value;

if(name===""){
alert("Enter Name");
return;
}

let total = document.getElementById("total").innerText;

let orderText = "";

for(let i=0;i<cart.length;i++){
orderText += cart[i][0] + " - ₹" + cart[i][1] + "%0A";
}

let message =
"New Bakery Order%0A%0A" +
"Name: " + name + "%0A%0A" +
orderText +
"%0ATotal: ₹" + total;

window.open(
"https://wa.me/919520309088?text=" + message,
"_blank"
);

}

</script>

</body>
</html>
